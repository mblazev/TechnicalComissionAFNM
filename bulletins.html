<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulletin Archive | AFNM Technical Commission</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="site-nav">
  <div class="nav-inner">
    <a class="nav-brand" href="index.html">
      <img src="ea48b0a3-b8c0-467f-838e-23affb25fd13.png" alt="AFNM" />
      AFNM · Tech Commission
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="serres.html">Serres</a>
      <a href="torpoznan.html">Tor Poznań</a>
      <a href="grobnik.html">Grobnik</a>
      <a href="bulletins.html" class="active">Bulletins</a>
    </div>
  </div>
</nav>

<header class="page-header">
  <div class="logos">
    <img src="ea48b0a3-b8c0-467f-838e-23affb25fd13.png" alt="AFNM Logo" />
    <img src="fia_wordmakr.png" alt="FIA Logo" />
    <img src="Central_European_Zone_logo.jpg" alt="CEZ Logo" />
  </div>
  <h1>Bulletin <span>Archive</span></h1>
  <p>Official communications — AFNM Technical Commission</p>
</header>

<main class="page-main">

  <div id="bulletin-archive">
    <p style="color:var(--muted);">Loading bulletins…</p>
  </div>

</main>

<footer class="site-footer">
  <div class="footer-logos">
    <img src="ea48b0a3-b8c0-467f-838e-23affb25fd13.png" alt="AFNM" />
    <img src="fia_wordmakr.png" alt="FIA" />
    <img src="Central_European_Zone_logo.jpg" alt="CEZ" />
  </div>
  <p class="footer-copy">&copy; 2026 Automobile Federation of North Macedonia — Technical Commission</p>
</footer>

<script>
  fetch('bulletins.json')
    .then(r => {
      if (!r.ok) throw new Error('Network response was not ok');
      return r.json();
    })
    .then(bulletins => {
      const el = document.getElementById('bulletin-archive');
      if (!bulletins.length) {
        el.innerHTML = '<p style="color:var(--muted)">No bulletins published yet.</p>';
        return;
      }
      el.innerHTML = '';
      const total = bulletins.length;
      bulletins.slice().reverse().forEach((b, i) => {
        el.innerHTML += `
          <div class="bulletin">
            <div class="bull-meta">Bulletin ${String(total - i).padStart(2,'0')} &mdash; ${b.timestamp}</div>
            <div class="bull-title">${b.title}</div>
            <div class="bull-body">${b.content}</div>
          </div>`;
      });
    })
    .catch(err => {
      console.error(err);
      document.getElementById('bulletin-archive').innerHTML =
        '<div class="notice" style="border-left-color:var(--accent)"><strong>Could not load bulletins</strong><p>Please try refreshing the page.</p></div>';
    });
</script>

</body>
</html>
